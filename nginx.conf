events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       ${PORT};
        server_name  localhost;

        location / {
            root   /app;
            index  index.html;
            try_files $uri $uri/ =404;

            # 🛡️ Content Security Policy unificada para Railway
            add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' blob:; worker-src 'self' blob:;" always;
        }

        # Manejo de tipos MIME para archivos modernos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            root /app;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            # Re-incluir el CSP en estáticos por si acaso
            add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' blob:; worker-src 'self' blob:;" always;
        }
    }
}
